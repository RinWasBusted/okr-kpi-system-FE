version: '3.8'

services:
  okr-kpi-client:
    image: tylerpham2708/okr-kpi-system-client:latest
    container_name: okr-kpi-client
    
    ports:
      - "8081:80"
    
    # Trong Compose, dùng restart thay cho restart_policy bên trong deploy
    restart: unless-stopped

    # Giới hạn tài nguyên trong Compose (thay cho resources trong deploy)
    mem_limit: 256m
    cpus: 0.25

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    networks:
      - okr-kpi-system-network

networks:
  okr-kpi-system-network:
    driver: bridge